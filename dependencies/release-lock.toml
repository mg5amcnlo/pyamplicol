# SPDX-License-Identifier: 0BSD
schema_version = 1

[project]
distribution = "pyamplicol"
version = "0.1.0"
python_requires = ">=3.11"
wheel_abi = "cp311-abi3"
license = "0BSD"

[abis]
python_api = 1
toml = 1
compiled_model = 9
process_artifact = 3
runtime_physics = 1
c_abi = 1
symbolica_serialization = "symbolica-bincode2-v1"
symjit_application = "symjit-application-storage-v3"
prepared_model_bundle = 1
prepared_kernel_variant = "pyamplicol-prepared-kernel-variant-v1"
eager_kernel = "pyamplicol-eager-kernel-v1"
eager_plan = "pyamplicol-eager-plan-v2"
eager_selector_domains = "pyamplicol-eager-selector-domains-v1"

[toolchain]
just = "1.46.0"
maturin = "1.14.1"
packaging = "26.2"
rust_minimum = "1.89.0"
rust_toolchain = "1.89.0"
rust_toolchain_action_sha = "c1709d61444fb708e6ed87924f95626398d8d115"
manylinux_image = "quay.io/pypa/manylinux_2_28_x86_64"
manylinux_image_digest = "sha256:b04887b645dde99b9e955aeae3ff4da414992d0bd88259f046295b56361c5614"

[[targets]]
triple = "aarch64-apple-darwin"
platform_tag = "macosx_11_0_arm64"

[[targets]]
triple = "x86_64-apple-darwin"
platform_tag = "macosx_11_0_x86_64"

[[targets]]
triple = "x86_64-unknown-linux-gnu"
platform_tag = "manylinux_2_28_x86_64"

[[python_dependencies]]
distribution = "colorama"
version = "0.4.6"

[[python_dependencies]]
distribution = "numpy"
version = "2.4.2"

[[python_dependencies]]
distribution = "platformdirs"
version = "4.10.0"

[[python_dependencies]]
distribution = "prettytable"
version = "3.18.0"

[[python_dependencies]]
distribution = "progressbar2"
version = "4.5.0"

[[python_dependencies]]
distribution = "six"
version = "1.17.0"

[[python_dependencies]]
distribution = "symbolica"
version = "2.1.0"

[[python_dependencies]]
distribution = "tomli-w"
version = "1.2.0"

[[python_dependencies]]
distribution = "ufo-model-loader"
version = "0.1.7"

[symbolica]
python_distribution = "symbolica"
python_version = "2.1.0"
rust_crate = "symbolica"
rust_version = "2.1.0"
published_symjit_version = "2.18.9"
serialization_abi = "symbolica-bincode2-v1"
release_status = "unverified"

[ufo_model_loader]
python_distribution = "ufo-model-loader"
required_version = "0.1.7"
latest_verified_published_version = "0.1.7"
release_status = "verified"
