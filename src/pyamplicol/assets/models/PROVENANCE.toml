authorized_by = "docs/development/MODEL_ASSET_PROVENANCE.md#before-extraction"

[[transformations]]
id = "loader-json-canonical-v1"
description = "Load the tracked frozen JSON variant without a restriction and reserialize with ufo-model-loader 0.1.7 JSONLook.VERBOSE"
authorized_by = "docs/development/MODEL_ASSET_PROVENANCE.md#before-extraction"

[[transformations]]
id = "loader-restriction-card-v1"
description = "Parse every external parameter from the matching sanitized UFO restriction card and serialize the complete card, including explicit zeros, with ufo-model-loader 0.1.7 JSONLook.VERBOSE"
authorized_by = "docs/development/MODEL_ASSET_PROVENANCE.md#before-extraction"

