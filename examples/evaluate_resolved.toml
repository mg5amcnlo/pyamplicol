# Helicity/color-resolved evaluation of the LC built-in-SM example.
# Empty selector arrays mean all physical IDs stored in the artifact.

schema_version = 1
action = "evaluate"

[evaluation]
artifact = "artifacts/builtin_sm_lc"
process = "ddbar_zg"
precision = 16
resolved = true
helicity_ids = []
color_flow_ids = []
model_parameters = "data/model_parameters.json"
momenta = "data/ddbar_zg_momenta.json"

[output]
format = "json"
progress = "off"
