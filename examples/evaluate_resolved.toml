# Helicity/color-resolved evaluation of one external-SM pp -> Zjj subprocess.
# Empty selector arrays mean all physical IDs stored in the artifact.

schema_version = 1
action = "evaluate"

[evaluation]
artifact = "artifacts/pp_zjj"
process = "p_p_to_z_j_j_4"
precision = 16
resolved = true
helicity_ids = []
color_flow_ids = []
model_parameters = "data/model_parameters.json"
momenta = "data/pp_zjj_momenta.json"

[output]
format = "json"
progress = "off"
