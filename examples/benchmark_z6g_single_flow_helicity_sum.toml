# SPDX-License-Identifier: 0BSD
# Reproduce the compiled JIT O3 Z-ladder single-flow, helicity-sum workload.
#
# From a copied examples directory, generate and profile with:
#   pyamplicol generate --card benchmark_z6g_single_flow_helicity_sum.toml
#   pyamplicol profile --card benchmark_z6g_single_flow_helicity_sum.toml

schema_version = 1
action = "generate"

[model]
source = "built-in-sm"
cache = true

[process]
entries = [
  { expression = "u u~ > Z g g g g g g", name = "uubar_Z_6g" },
]
# Source labels are 1:u, 2:u~, 3:Z, and 4..9:the six gluons. This is
# the source-mapped reference order used by the Z performance ladder.
reference_color_order = [2, 4, 5, 6, 7, 8, 9, 1, 3]
selected_color_sector_ids = [0]

[color]
accuracy = "lc"

[generation]
output = "artifacts/uubar_z6g_single_flow_helicity_sum"
mode = "error"
workers = 1
emit_api_bundle = true

[generation.validation]
enabled = true
samples = 10
seed = 12345
relative_tolerance = 1e-12
absolute_tolerance = 1e-300
post_build_validation = true

[evaluator]
backend = "jit"
execution_mode = "compiled"
batch_size = 64
output_chunk_size = 512

[evaluator.optimization]
horner_iterations = 10
cores = 1
max_horner_variables = 1000
max_common_pair_cache_entries = 5000000
max_common_pair_distance = 1000
collect_factors = "auto"

[evaluator.jit]
optimization_level = 3

[evaluation]
artifact = "artifacts/uubar_z6g_single_flow_helicity_sum"
process = "u u~ > Z g g g g g g"
precision = 16

[benchmark]
target_runtime = 20.0
batch_size = 64
precision = 16
warmup_runs = 2
minimum_samples = 5

[output]
format = "human"
color = "auto"
progress = "auto"
log_level = "info"
