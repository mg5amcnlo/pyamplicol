# SPDX-License-Identifier: 0BSD
# One named artifact containing 2-to-2 and 2-to-3 processes.
# Generation can reuse proven final-state permutations within the set.

schema_version = 1
action = "generate"

[model]
source = "built-in-sm"

[process]
entries = [
  { expression = "d d~ > z g", name = "ddbar_zg" },
  { expression = "d d~ > z g g", name = "ddbar_zgg" },
]
flavor_scheme = 5
max_quark_lines = 2

[color]
accuracy = "lc"

[generation]
output = "artifacts/mixed_multiplicity"
workers = "auto"
emit_api_bundle = true

[generation.validation]
enabled = true
samples = 3
seed = 12345

[evaluator]
backend = "jit"
batch_size = 128
