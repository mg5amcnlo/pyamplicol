# Serialized scalar contact model named "scalars".
# Materialize models/json/scalars/scalars.json with copy_packaged_models.py.

schema_version = 1
action = "generate"

[model]
source = "models/json/scalars/scalars.json"
simplify = true

[process]
entries = [
  { expression = "scalar_0 scalar_0 > scalar_0 scalar_0", name = "scalar_contact_2to2" },
  { expression = "scalar_0 scalar_0 > 3*scalar_0", name = "scalar_contact_2to3" },
]

[process.max_coupling_orders]
QED = 6

[color]
accuracy = "lc"

[generation]
output = "artifacts/external_json_scalars"
emit_api_bundle = true

[evaluator]
backend = "jit"
