# SPDX-License-Identifier: 0BSD
# Primary multiprocess example using the serialized external Standard Model.
# `pyamplicol examples copy` materializes models/json/sm beside this card.

schema_version = 1
action = "generate"

[model]
source = "models/json/sm/sm.json"
restriction = "default"
simplify = true

[process]
entries = [{ expression = "p p > Z j j" }]
flavor_scheme = 2
max_quark_lines = 2

[process.multiparticles]
p = ["d", "d~", "g"]
j = ["d", "d~", "g"]

[color]
accuracy = "lc"

[generation]
output = "artifacts/pp_zjj"
emit_api_bundle = true

[evaluator]
backend = "jit"

[evaluator.jit]
optimization_level = 3
