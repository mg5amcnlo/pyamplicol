# Built-in Standard Model generation with next-to-leading-color contraction.
# Resolved runtime output has one contracted color entry per helicity.

schema_version = 1
action = "generate"

[model]
source = "built-in-sm"

[process]
entries = [{ expression = "d d~ > z g", name = "ddbar_zg_nlc" }]

[color]
accuracy = "nlc"

[generation]
output = "artifacts/builtin_sm_nlc"
mode = "error"
emit_api_bundle = true

[evaluator]
backend = "jit"

[output]
progress = "log"
