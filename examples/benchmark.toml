# Short benchmark of the optimized summed runtime path.

schema_version = 1
action = "benchmark"

[evaluation]
artifact = "artifacts/pp_zjj"
process = "d d~ > z g g"
momenta = "data/pp_zjj_momenta.json"

[benchmark]
target_runtime = 1.0
batch_size = 128
precision = 16
warmup_runs = 2
minimum_samples = 5
helicity_ids = []
color_flow_ids = []

[output]
format = "json"
progress = "log"
