# SPDX-License-Identifier: 0BSD
# Exercise compiled JIT O3 with one source helicity fixed at generation time
# and a complete LC-flow sum. This is the generation-specialized baseline for
# the reusable runtime-helicity selector comparison documented in README.md.

schema_version = 1
action = "generate"

[model]
source = "built-in-sm"
cache = true

[process]
entries = [
  { expression = "u u~ > Z g g g g g g", name = "uubar_Z_6g" },
]
# Source labels are 1:u, 2:u~, 3:Z, and 4..9:the six gluons. Unlike the
# reusable example, this card intentionally fixes one helicity assignment
# during generation and cannot switch to another assignment at runtime.
selected_source_helicities = { "1" = -1, "2" = 1, "3" = -1, "4" = 1, "5" = -1, "6" = 1, "7" = -1, "8" = 1, "9" = -1 }

[color]
accuracy = "lc"

[generation]
output = "artifacts/uubar_z6g_generation_specialized_all_flows_single_helicity"
mode = "error"
workers = 1
emit_api_bundle = true

[generation.validation]
enabled = true
samples = 10
seed = 12345
relative_tolerance = 1e-12
absolute_tolerance = 1e-300
post_build_validation = true

[evaluator]
backend = "jit"
execution_mode = "compiled"
batch_size = 64
output_chunk_size = 512

[evaluator.optimization]
horner_iterations = 10
cores = 1
max_horner_variables = 1000
max_common_pair_cache_entries = 5000000
max_common_pair_distance = 1000
collect_factors = "auto"

[evaluator.jit]
optimization_level = 3

[evaluation]
artifact = "artifacts/uubar_z6g_generation_specialized_all_flows_single_helicity"
process = "u u~ > Z g g g g g g"
precision = 16

[benchmark]
target_runtime = 20.0
batch_size = 64
precision = 16
warmup_runs = 2
minimum_samples = 5
helicity_ids = ["h:-1,+1,-1,+1,-1,+1,-1,+1,-1"]

[output]
format = "human"
color = "auto"
progress = "auto"
log_level = "info"
