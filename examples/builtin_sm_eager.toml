# SPDX-License-Identifier: 0BSD
# Built-in Standard Model generation with prepared eager JIT O3 kernels.
# Uses the portable prepared model bundled with the installed wheel.

schema_version = 1
action = "generate"

[model]
source = "built-in-sm"

[process]
entries = [{ expression = "d d~ > z g g", name = "eager_zgg" }]

[color]
accuracy = "lc"

[generation]
output = "artifacts/builtin_sm_eager"
mode = "error"
emit_api_bundle = true

[evaluator]
execution_mode = "eager"
backend = "jit"
batch_size = 128

[evaluator.jit]
optimization_level = 3

[evaluator.eager]
point_tile_size = 1024
workspace_mib = 256

[output]
progress = "auto"
log_level = "info"
