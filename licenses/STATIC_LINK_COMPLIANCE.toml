# SPDX-License-Identifier: 0BSD
#
# The release artifacts use the f64-only Rusticol feature closure. Symbolica's
# optional arbitrary-precision Rust closure remains in Cargo.lock for developer
# checks, but it is not linked into either distributed native artifact.
schema_version = 1
candidate_builds_allowed = true
release_ready = true
status = "complete"

policy = "Shipped f64 artifacts must exclude Symbolica, GMP/Rug, and Malachite code"
supported_strategy = "feature-separation-and-target-binary-audit"

# Cargo metadata validates the target-specific feature closures. Wheel audits
# independently reject GMP/MPFR/Malachite markers in the extension and static
# SDK archive. There is no active LGPL family requiring relinking evidence.
evidence = []
coverage = []

[[known_family]]
name = "gmp"
crate_names = ["gmp-mpfr-sys", "rug"]
license = "LGPL-3.0-or-later"
note = "Present only in the optional, non-shipped Symbolica runtime closure"

[[known_family]]
name = "malachite"
crate_names = [
  "malachite",
  "malachite-base",
  "malachite-float",
  "malachite-nz",
  "malachite-q",
]
license = "LGPL-3.0-only"
note = "Present only in the optional, non-shipped Symbolica runtime closure"
