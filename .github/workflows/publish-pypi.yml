name: Publish validated artifacts

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: Run ID from the validated release artifacts workflow
        required: true
        type: string
      repository:
        description: Trusted Publishing destination
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions: {}

jobs:
  pypi:
    runs-on: ubuntu-24.04
    environment:
      name: ${{ inputs.repository }}
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Verify the validated release workflow run
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ inputs.artifact_run_id }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          run_id = int(os.environ["SOURCE_RUN_ID"])
          headers = {
              "Accept": "application/vnd.github+json",
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def get_json(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          def require(condition, message):
              if not condition:
                  raise RuntimeError(message)

          api = "https://api.github.com"
          run = get_json(f"{api}/repos/{repository}/actions/runs/{run_id}")
          workflow = get_json(run["workflow_url"])
          require(run["conclusion"] == "success", "release workflow did not succeed")
          require(run["event"] == "workflow_dispatch", "release workflow was not manually dispatched")
          require(run["head_repository"]["full_name"] == repository, "release workflow came from another repository")
          require(run["head_branch"] == run["repository"]["default_branch"], "release workflow did not run from the default branch")
          require(workflow["path"] == ".github/workflows/release-artifacts.yml", "unexpected source workflow")

          jobs = get_json(
              f"{api}/repos/{repository}/actions/runs/{run_id}/jobs?per_page=100"
          )["jobs"]
          required_jobs = {
              "Full source validation gate",
              "Independent Fortran physics oracle",
              "Build retained source distribution",
              "macOS release wheel and native deployment (macos-arm64)",
              "macOS release wheel and native deployment (macos-x86_64)",
              "manylinux release wheel and native deployment",
              "Collect validated release artifacts",
          }
          jobs_by_name = {}
          for job in jobs:
              jobs_by_name.setdefault(job["name"], []).append(job)
          require(set(jobs_by_name) >= required_jobs, "release workflow is missing required jobs")
          for name in required_jobs:
              matches = jobs_by_name[name]
              require(len(matches) == 1, f"required job {name!r} is not unique")
              require(matches[0]["conclusion"] == "success", f"required job {name!r} did not succeed")

          source_gate = jobs_by_name["Full source validation gate"][0]
          source_steps = [
              step for step in source_gate["steps"]
              if step["name"] == "Run complete release source gate"
          ]
          require(len(source_steps) == 1, "source validation step is not unique")
          require(source_steps[0]["conclusion"] == "success", "source validation step did not succeed")

          oracle_gate = jobs_by_name["Independent Fortran physics oracle"][0]
          oracle_steps = [
              step for step in oracle_gate["steps"]
              if step["name"] == "Rebuild and verify pinned Fortran evidence"
          ]
          require(len(oracle_steps) == 1, "independent physics-oracle step is not unique")
          require(oracle_steps[0]["conclusion"] == "success", "independent physics-oracle step did not succeed")
          PY
      - name: Download validated package files
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: pyamplicol-validated-release
          path: validated
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ github.token }}
      - name: Verify release package inventory
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          root = Path("validated")
          files = sorted(path for path in root.iterdir() if path.is_file())
          wheels = [path for path in files if path.suffix == ".whl"]
          sdists = [path for path in files if path.name.endswith(".tar.gz")]
          unexpected = [path for path in files if path not in {*wheels, *sdists}]
          if unexpected:
              raise RuntimeError(
                  "validated artifact contains unexpected files: "
                  + ", ".join(path.name for path in unexpected)
              )
          if len(wheels) != 3 or len(sdists) != 1:
              raise RuntimeError(
                  f"expected three wheels and one sdist, found {len(wheels)} wheels "
                  f"and {len(sdists)} sdists"
              )
          expected_platforms = {
              "macosx_11_0_arm64",
              "macosx_11_0_x86_64",
              "manylinux_2_28_x86_64",
          }
          platforms = {
              next(
                  (platform for platform in expected_platforms if platform in path.name),
                  None,
              )
              for path in wheels
          }
          if platforms != expected_platforms:
              raise RuntimeError(f"unexpected wheel platform inventory: {platforms}")
          if any("candidate" in path.name or "dev0" in path.name for path in files):
              raise RuntimeError("candidate artifacts cannot be published")
          PY
      - name: Publish validated artifacts to TestPyPI
        if: inputs.repository == 'testpypi'
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0
        with:
          packages-dir: validated
          repository-url: https://test.pypi.org/legacy/
      - name: Publish validated artifacts to PyPI
        if: inputs.repository == 'pypi'
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0 # v1.9.0
        with:
          packages-dir: validated
